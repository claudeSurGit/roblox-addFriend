<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roblox Profile</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left"><img src="./img/blue-roblox-logo.png" alt="Roblox Logo" class="logo"> Roblox</div>
    <div class="nav-right">
        <input type="text" placeholder="Rechercher">
    </div>
</header>

<main class="container">

    <!-- PROFILE HEADER -->
    <section class="profile-header">
      
        <img src="./img/profile.png" class="avatar-sm" class="profile">

        <div class="profile-info">
            <h2>Eliossolie22</h2>
            <p class="username">@Eliossolie22</p>

            <div class="actions">
                <button class="btn primary" onclick="goLogin()">Ajouter ami</button>
                <button class="btn" onclick="goLogin()">Suivre</button>
                <button class="btn" onclick="goLogin()">Se connecter</button>
            </div>

            <div class="stats">
                <span><b>3</b> Amis</span>
                <span><b>0</b> Followers</span>
                <span><b>0</b> Following</span>
            </div>
        </div>
    </section>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('about', this)">À propos</button>
        <button class="tab" onclick="switchTab('games', this)">Créations</button>
    </div>

    <!-- TAB CONTENT -->
    <section id="about" class="tab-content active">
        <div class="card">
            <h3>Description</h3>
            <p>Bienvenue sur mon profil Roblox !</p>
            <img src="./img/skin.png" alt="Skin" style="display: block; margin: 0 auto; max-width: 100%;">
        </div>

        <div class="card">
            <h3>Amis</h3>
            <div class="grid">
                <img src="./img/amis1.png" class="avatar-sm" alt="Ami 1">
                <img src="./img/amis2.png" class="avatar-sm" alt="Ami 2">
                <img src="./img/amis3.png" class="avatar-sm" alt="Ami 3">
                
            </div>
        </div>
    </section>

    <section id="games" class="tab-content">
        <div class="card">
            <h3>Expériences</h3>
            <div class="grid">
                <img src="./img/creation1.png" class="game-card" alt="Création 1">
                
            </div>
        </div>
    </section>

</main>

<script src="./js/script.js"></script>
</body>
</html>
